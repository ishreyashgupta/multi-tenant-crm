name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run tests (currently none)
        run: npm test
        continue-on-error: true

      - name: Start server + health check
        env:
          NODE_ENV: test
          PORT: 5000
          JWT_SECRET: dummy
          MONGODB_URI: mongodb://localhost:27017/saasify
        run: |
          node src/server.js &
          SERVER_PID=$!

          for i in {1..30}; do
            if curl -fsS "http://localhost:5000/api/health" >/dev/null; then
              echo "Health OK"
              break
            fi
            sleep 1
          done

          curl -fsS "http://localhost:5000/api/health"
          kill $SERVER_PID
